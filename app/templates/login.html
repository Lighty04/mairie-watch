<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — MairieWatch</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 0 1rem; background: #f5f7fa; color: #1a1a2e; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; font-size: 1.4rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; font-weight: 500; color: #5a6a7f; }
        input { width: 100%; padding: 0.6rem; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 0.95rem; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.7rem; background: #1a1a2e; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #5a6a7f; }
        .link a { color: #1a1a2e; }
        .error { color: #dc2626; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tabs button { flex: 1; background: #e9ecef; color: #495057; }
        .tabs button.active { background: #1a1a2e; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔔 MairieWatch</h1>
        <p style="color:#5a6a7f;font-size:0.9rem;margin-bottom:1.5rem;">Surveillance des décisions municipales</p>
        
        <div class="tabs">
            <button class="active" onclick="showTab('login')">Connexion</button>
            <button onclick="showTab('register')">Inscription</button>
        </div>

        <div id="login" class="tab-content active">
            <form hx-post="/api/auth/login" hx-target=".error" hx-swap="innerHTML"
                  onsubmit="handleAuth(this, 'login')">
                <label>Email</label>
                <input type="email" name="email" required />
                <label>Mot de passe</label>
                <input type="password" name="password" required />
                <div class="error"></div>
                <button type="submit">Se connecter</button>
            </form>
        </div>

        <div id="register" class="tab-content">
            <form hx-post="/api/auth/register" hx-target=".error" hx-swap="innerHTML"
                  onsubmit="handleAuth(this, 'register')">
                <label>Nom</label>
                <input type="text" name="name" />
                <label>Email</label>
                <input type="email" name="email" required />
                <label>Mot de passe</label>
                <input type="password" name="password" required minlength="6" />
                <div class="error"></div>
                <button type="submit">Créer un compte</button>
            </form>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        function handleAuth(form, action) {
            form.addEventListener('htmx:afterRequest', function(e) {
                if (e.detail.successful) {
                    window.location.href = '/';
                }
            });
        }
    </script>
</body>
</html>
